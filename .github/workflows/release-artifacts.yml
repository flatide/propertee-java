name: Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release artifacts
        run: ./gradlew --no-daemon test jarAll

      - name: Collect release files
        run: |
          mkdir -p release-assets
          cp build/libs/propertee-java-java7.jar release-assets/
          cp build/libs/propertee-java-java8.jar release-assets/

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes "Automated release for $TAG_NAME"
          fi
          gh release upload "$TAG_NAME" release-assets/* --clobber
