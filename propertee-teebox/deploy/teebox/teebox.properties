# ProperTee TeeBox deployment config

propertee.teebox.bind=127.0.0.1
propertee.teebox.port=18080
propertee.teebox.scriptsRoot=/opt/teebox/scripts
propertee.teebox.dataDir=/var/lib/teebox
propertee.teebox.maxRuns=4

# Optional API token for /api/*
# propertee.teebox.apiToken=change-me

# Optional retention tuning
# propertee.task.retentionMs=86400000
# propertee.task.archiveRetentionMs=604800000
# propertee.teebox.runRetentionMs=86400000
# propertee.teebox.runArchiveRetentionMs=604800000
