# ProperTee mock server deployment config

propertee.mock.bind=127.0.0.1
propertee.mock.port=18080
propertee.mock.scriptsRoot=/opt/propertee-mock/scripts
propertee.mock.dataDir=/var/lib/propertee-mock
propertee.mock.maxRuns=4

# Optional API token for /api/*
# propertee.mock.apiToken=change-me

# Optional retention tuning
# propertee.task.retentionMs=86400000
# propertee.task.archiveRetentionMs=604800000
# propertee.mock.runRetentionMs=86400000
# propertee.mock.runArchiveRetentionMs=604800000
